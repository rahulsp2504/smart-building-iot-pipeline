name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: tests against live services ─────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB:       testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

      mosquitto:
        image: eclipse-mosquitto:2
        ports: ["1883:1883"]
        options: >-
          --health-cmd "mosquitto_pub -h localhost -t health -m ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Apply DB schema
        env:
          PGPASSWORD: testpass
        run: |
          psql -h localhost -U testuser -d testdb -f ../db/init.sql

      - name: Start BACnet device
        run: |
          pip install -r ../bacnet/requirements.txt
          BACNET_REST_HOST=0.0.0.0 BACNET_REST_PORT=8001 python ../bacnet/device.py &
          sleep 3
          curl -sf http://localhost:8001/health || (echo "BACnet failed to start" && exit 1)

      - name: Start FastAPI backend
        env:
          DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/testdb
          MQTT_HOST:    localhost
          MQTT_PORT:    1883
          BACNET_URL:   http://localhost:8001
          ALLOWED_ORIGINS: "http://localhost:5173"
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/health || (echo "Backend failed to start" && exit 1)

      - name: Start sensor simulator
        env:
          MQTT_HOST:        localhost
          MQTT_PORT:        1883
          BACNET_URL:       http://localhost:8001
          PUBLISH_INTERVAL: 3
        run: |
          pip install -r ../simulator/requirements.txt
          python ../simulator/simulator.py &
          sleep 15  # let simulator publish enough data for tests

      - name: Run tests
        env:
          API_BASE:    http://localhost:8000
          BACNET_BASE: http://localhost:8001
        run: pytest tests/ -v --tb=short

  # ── Frontend: install + build ─────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install
        run: npm install

      - name: Build
        env:
          VITE_API_URL: /api
          VITE_WS_URL:  ""
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "Build output missing" && exit 1)
          echo "Build size: $(du -sh dist/)"

  # ── Docker: build all images ──────────────────────────────────────────────
  docker:
    name: Docker Builds
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build bacnet image
        uses: docker/build-push-action@v6
        with:
          context: ./bacnet
          push: false
          tags: sb-bacnet:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: sb-backend:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build simulator image
        uses: docker/build-push-action@v6
        with:
          context: ./simulator
          push: false
          tags: sb-simulator:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: sb-frontend:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max
