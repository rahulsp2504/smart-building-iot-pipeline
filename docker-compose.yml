version: "3.9"

# ============================================================
# Smart Building DR Middleware — Local Dev Stack
# Services: timescaledb, mosquitto, bacnet, backend, simulator, frontend
# Usage: docker compose up --build
# ============================================================

services:

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: sb_db
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-smartbuilding}
    ports: ["5432:5432"]
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-smartbuilding}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [sb_net]

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sb_mqtt
    ports: ["1883:1883","9001:9001"]
    volumes:
      - ./broker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL","mosquitto_pub -h localhost -t health -m ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [sb_net]

  bacnet:
    build: { context: ./bacnet, dockerfile: Dockerfile }
    container_name: sb_bacnet
    environment:
      BACNET_REST_HOST: 0.0.0.0
      BACNET_REST_PORT: 8001
    ports: ["8001:8001"]
    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [sb_net]

  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: sb_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@timescaledb:5432/${POSTGRES_DB:-smartbuilding}
      MQTT_HOST:    mosquitto
      MQTT_PORT:    1883
      BACNET_URL:   http://bacnet:8001
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:80"
    ports: ["8000:8000"]
    depends_on:
      timescaledb: { condition: service_healthy }
      mosquitto:   { condition: service_healthy }
      bacnet:      { condition: service_healthy }
    networks: [sb_net]
    restart: on-failure

  simulator:
    build: { context: ./simulator, dockerfile: Dockerfile }
    container_name: sb_simulator
    environment:
      MQTT_HOST:       mosquitto
      MQTT_PORT:       1883
      BACNET_URL:      http://bacnet:8001
      PUBLISH_INTERVAL: 5
    depends_on:
      mosquitto: { condition: service_healthy }
      bacnet:    { condition: service_healthy }
    networks: [sb_net]
    restart: on-failure

  frontend:
    image: node:20-alpine
    container_name: sb_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL:  ws://localhost:8000/ws
    ports: ["5173:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on: [backend]
    networks: [sb_net]

volumes:
  timescale_data:
  mosquitto_data:

networks:
  sb_net:
    driver: bridge
